{% extends 'base.html' %}
{% block title %}Edit Profile — KaviNet{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="kv-card mt-2">

        <div class="mb-4">
          <h4 style="font-family:'Playfair Display',serif;margin-bottom:0.25rem;">
            <i class="bi bi-pencil" style="color:var(--kv-accent);"></i> Edit Profile
          </h4>
          <p class="text-muted mb-0" style="font-size:0.875rem;">
            Update your bio and social links so readers can find you
          </p>
        </div>

        <form method="POST">

          <!-- Bio -->
          <div class="mb-3">
            <label class="kv-label form-label">Bio</label>
            <textarea name="bio" class="form-control kv-input" rows="3"
                      placeholder="Tell readers about yourself…">{{ user[4] or '' }}</textarea>
          </div>

          <hr style="border-color:var(--kv-border);margin:1.5rem 0;"/>
          <p style="font-size:0.8rem;color:var(--kv-muted);text-transform:uppercase;
                    letter-spacing:1px;margin-bottom:1rem;">Social Links</p>

          <!-- Facebook -->
          <div class="mb-3">
            <label class="kv-label form-label">
              <i class="bi bi-facebook" style="color:#1877f2;"></i> Facebook URL
            </label>
            <input type="url" name="facebook" class="form-control kv-input"
                   placeholder="https://facebook.com/yourprofile"
                   value="{{ user[6] or '' }}"/>
          </div>

          <!-- Instagram -->
          <div class="mb-3">
            <label class="kv-label form-label">
              <i class="bi bi-instagram" style="color:#e1306c;"></i> Instagram Username
            </label>
            <div class="input-group">
              <span class="input-group-text"
                    style="background:var(--kv-bg);border-color:var(--kv-border);
                           font-size:0.875rem;">@</span>
              <input type="text" name="instagram" class="form-control kv-input"
                     placeholder="yourhandle"
                     value="{{ user[7] or '' }}"/>
            </div>
          </div>

          <!-- WhatsApp -->
          <div class="mb-3">
            <label class="kv-label form-label">
              <i class="bi bi-whatsapp" style="color:#25d366;"></i> WhatsApp Number
            </label>
            <div class="input-group">
              <span class="input-group-text"
                    style="background:var(--kv-bg);border-color:var(--kv-border);
                           font-size:0.875rem;">+91</span>
              <input type="text" name="whatsapp" class="form-control kv-input"
                     placeholder="9876543210"
                     value="{{ user[8] or '' }}"/>
            </div>
          </div>

          <!-- Twitter/X -->
          <div class="mb-4">
            <label class="kv-label form-label">
              <i class="bi bi-twitter-x"></i> Twitter/X Username
            </label>
            <div class="input-group">
              <span class="input-group-text"
                    style="background:var(--kv-bg);border-color:var(--kv-border);
                           font-size:0.875rem;">@</span>
              <input type="text" name="twitter" class="form-control kv-input"
                     placeholder="yourhandle"
                     value="{{ user[9] or '' }}"/>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn kv-btn-accent px-4">
              <i class="bi bi-check-lg"></i> Save Changes
            </button>
            <a href="{{ url_for('profile', username=session['username']) }}"
               class="btn kv-btn-outline px-4">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
