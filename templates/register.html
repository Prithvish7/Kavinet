{% extends 'base.html' %}
{% block title %}Join KaviNet{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="kv-card mt-4">
        <div class="text-center mb-4">
          <i class="bi bi-feather" style="font-size:2rem;color:var(--kv-accent);"></i>
          <h4 class="mt-2" style="font-family:'Playfair Display',serif;">Join KaviNet</h4>
          <p class="text-muted" style="font-size:0.875rem;">Create your writer's profile today</p>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label kv-label">Username</label>
            <input type="text" name="username" class="form-control kv-input"
                   placeholder="e.g. poetrylover" required/>
          </div>
          <div class="mb-3">
            <label class="form-label kv-label">Email</label>
            <input type="email" name="email" class="form-control kv-input"
                   placeholder="you@example.com" required/>
          </div>
          <div class="mb-4">
            <label class="form-label kv-label">Password</label>
            <input type="password" name="password" class="form-control kv-input"
                   placeholder="Min. 6 characters" required/>
          </div>
          <button type="submit" class="btn kv-btn-accent w-100">Create Account</button>
        </form>

        <p class="text-center mt-3" style="font-size:0.875rem;color:var(--kv-muted);">
          Already have an account?
          <a href="{{ url_for('login') }}" style="color:var(--kv-accent);">Login</a>
        </p>
      </div>

    </div>
  </div>
</div>
{% endblock %}
